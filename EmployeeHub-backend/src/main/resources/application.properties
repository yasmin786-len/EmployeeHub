# ============================================
# Application Info
# ============================================
spring.application.name=employee-management-backend
server.port=8080

# ============================================
# MySQL Datasource Configuration
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# SQL / Hibernate Logging
# ============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.example.employeemanagement=DEBUG

# ============================================
# Jackson (JSON) Configuration
# ============================================
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================
# Validation - return clear error body on bad requests
# ============================================
server.error.include-message=always
server.error.include-binding-errors=always
